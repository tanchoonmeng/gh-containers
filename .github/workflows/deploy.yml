name: Deployment (Container)
on:
  push:
    branches:
      - main
      - dev
env:
  CACHE_KEY: node-deps
  MONGODB_DB_NAME: gha-demo
jobs:
  test:
    environment: testing
    runs-on: ubuntu-latest # comes with node.js presinatalled
    # container: node:26 # OK but doesn't allow env vars to be set in the workflow file, so we use the workaround below
    # container:
    #   image: node:26
    #   env: 
    #     DUMMY: dummy
    env:
      MONGODB_CONNECTION_PROTOCOL: mongodb
      # MONGODB_CLUSTER_ADDRESS: mongodb
      MONGODB_CLUSTER_ADDRESS: localhost:27017 # needed to use localhost and port when nodejs is running from runner instead of inside a container
      MONGODB_USERNAME: root
      MONGODB_PASSWORD: example
      PORT: 8080
    services: # do not require clients to also be a container (can be just runner)
      mongodb:
        image: mongo
        ports: # needed when nodejs is running from runner instead of inside a container 
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example        
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ env.CACHE_KEY }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT # requires MongoDB Atlas to accept requests from anywhere!
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: $MONGODB_USERNAME"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        env:
          PORT: 3000
        run: |        
          echo "MONGODB_DB_NAME: $MONGODB_DB_NAME"
          echo "MONGODB_USERNAME: $MONGODB_USERNAME"
          echo "${{ env.PORT }}"
